<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 · 굿즈샵</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">🎀 굿즈샵</a>
  <div class="nav-links">
    <span style="font-size:13px;color:var(--text-light)">⚙️ 관리자 모드</span>
    <div id="nav-auth"></div>
  </div>
</nav>

<div class="container">
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:8px">
    <h1 class="page-title" style="margin:0">📊 전체 주문 관리</h1>
    <div style="display:flex;gap:12px;font-size:14px">
      <span id="total-count" style="color:var(--text-light)"></span>
      <span id="total-amount" style="color:var(--pink);font-weight:700"></span>
    </div>
  </div>

  <div class="filter-bar">
    <select id="status-filter">
      <option value="">전체 상태</option>
      <option value="pending">결제 대기</option>
      <option value="success">결제 완료</option>
      <option value="failed">결제 실패</option>
      <option value="cancelled">취소됨</option>
    </select>
  </div>

  <div class="card" style="padding:0;overflow:hidden">
    <div class="table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th>주문일시</th>
            <th>구매자</th>
            <th>상품</th>
            <th>금액</th>
            <th>상태</th>
            <th>주문번호</th>
          </tr>
        </thead>
        <tbody id="orders-tbody">
          <tr><td colspan="6" class="loading">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<footer>© 2025 굿즈샵 관리자</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
<script>
initAdmin();
</script>
</body>
</html>
