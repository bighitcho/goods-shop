<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 · 굿즈샵</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">🎀 굿즈샵</a>
  <div class="nav-links"><div id="nav-auth"></div></div>
</nav>

<div class="container">
  <div class="form-container card">
    <h1 class="form-title">🔑 로그인</h1>
    <p class="form-subtitle">계정이 없으신가요? <a href="signup.html">회원가입</a></p>

    <div class="form-group">
      <label>이메일</label>
      <input type="email" id="email" placeholder="email@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="password" placeholder="비밀번호 입력" autocomplete="current-password">
    </div>

    <p class="error-msg" id="error-msg"></p>
    <button class="btn btn-primary form-submit" id="login-btn" onclick="handleLogin()">로그인</button>

    <p class="form-footer" style="margin-top:20px">
      <a href="index.html">← 쇼핑 계속하기</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
// 이미 로그인된 경우 메인으로
getCurrentUser().then(user => {
  if (user) window.location.href = 'index.html';
});

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

async function handleLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');
  const errEl    = document.getElementById('error-msg');

  errEl.classList.remove('show');

  if (!email || !password) {
    errEl.textContent = '이메일과 비밀번호를 입력해주세요.';
    errEl.classList.add('show');
    return;
  }

  btn.textContent = '로그인 중...';
  btn.disabled = true;

  const { data, error } = await signIn(email, password);

  if (error) {
    errEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
    errEl.classList.add('show');
    btn.textContent = '로그인';
    btn.disabled = false;
    return;
  }

  // 관리자 여부 확인 후 리다이렉트
  const admin = await isAdmin();
  window.location.href = admin ? 'admin.html' : 'index.html';
}
</script>
</body>
</html>
