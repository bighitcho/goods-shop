<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결제 실패 · 굿즈샵</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">🎀 굿즈샵</a>
</nav>

<div class="container">
  <div class="result-page" id="result">
    <span class="result-icon">😢</span>
    <h1 class="result-title">결제에 실패했어요</h1>
    <p class="result-desc" id="fail-desc">알 수 없는 오류가 발생했습니다.<br>다시 시도해 주세요.</p>
    <div class="result-actions">
      <a href="checkout.html" class="btn btn-primary">다시 결제하기</a>
      <a href="index.html" class="btn btn-outline">홈으로</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
(async () => {
  const params  = new URLSearchParams(location.search);
  const code    = params.get('code') || '';
  const message = params.get('message') || '결제가 취소되었거나 오류가 발생했습니다.';

  const descEl = document.getElementById('fail-desc');
  descEl.innerHTML = `${message}<br><small style="color:var(--text-light)">오류 코드: ${code || 'UNKNOWN'}</small>`;

  // 실패한 주문 상태 업데이트 (orderId가 있는 경우)
  const orderId = params.get('orderId');
  if (orderId) {
    await db.from('orders').update({ status: 'failed' }).eq('toss_order_id', orderId);
  }
})();
</script>
</body>
</html>
